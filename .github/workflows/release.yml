name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify files
        shell: pwsh
        run: |
          .\build-single-bat.ps1 -Test

      - name: Build .bat
        shell: pwsh
        run: |
          .\build-single-bat.ps1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MPV-Interp-Wizard.bat
            SHA256.txt
          generate_release_notes: true
          draft: false
          prerelease: false
